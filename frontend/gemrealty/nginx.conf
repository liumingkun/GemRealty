server {
    listen       8080;
    server_name  localhost;

    # Serve static files from the build directory
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Handle client-side routing by redirecting all missing files to index.html
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy API requests to the backend if hosted on the same domain
    # location /api/ {
    #     proxy_pass https://gemrealty-backend-url.run.app/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Error handling
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
