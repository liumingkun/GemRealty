# default.conf.template

server {
    listen       8080;
    #server_name  localhost;

    # Logging to stdout and stderr for container logs
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Serve static files from the build directory
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Handle client-side routing by redirecting all missing files to index.html
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        # 1. Use the 2nd URL (the one ending in .a.run.app)
        proxy_pass https://gemrealty-backend-lfl2ohixga-pd.a.run.app/api/;

        # 2. CRITICAL: Set the Host header to match the backend URL exactly
        proxy_set_header Host gemrealty-backend-lfl2ohixga-pd.a.run.app;

        # 3. Standard headers for passing client info
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 4. Use Google's resolver to ensure NGINX can find the URL
        resolver 8.8.8.8;
    }
    # Error handling
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
